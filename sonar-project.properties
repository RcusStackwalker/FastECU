sonar.projectKey=RcusStackwalker_FastECU
sonar.organization=rcusstackwalker
sonar.projectName=FastECU
sonar.host.url=https://sonarcloud.io
sonar.cfamily.compile-commands=compile_commands.json

sonar.sources=.
sonar.tests=tests,src
sonar.test.inclusions=tests/**,src/**/*_test.cpp,src/**/*_test.h

sonar.cfamily.llvm-cov.reportPath=coverage/llvm-cov.report

# Silence the Python-3-version analysis hint by pinning the toolchain version
# (matches the rules_python 3.14 toolchain in MODULE.bazel).
sonar.python.version=3.14

sonar.exclusions=\
  tests/**,\
  src/**/*_test.cpp,\
  src/**/*_test.h,\
  FastECU.app/**,\
  resources/shared/kernels/**,\
  coverage/**,\
  dist/**,\
  .tmp/**,\
  bazel-*/**,\
  external/**,\
  **/build/**,\
  **/*build-*/**,\
  **/*.o,\
  **/*.a,\
  **/*.so,\
  **/*.dll,\
  **/*.dylib,\
  **/*.png,\
  **/*.jpg,\
  **/*.jpeg,\
  **/*.ico,\
  **/*.ttf,\
  **/*.qm,\
  **/*.ts,\
  **/Makefile*,\
  **/moc_*,\
  **/ui_*,\
  **/qrc_*,\
  **/rep_*_replica.h

sonar.coverage.exclusions=\
  tests/**,\
  src/**/*_test.cpp,\
  src/**/*_test.h,\
  src/ui/desktop/hexedit/**,\
  scripts/**,\
  **/moc_*,\
  **/ui_*,\
  **/qrc_*,\
  **/rep_*_replica.h
