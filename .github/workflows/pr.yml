name: pr

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  QT_MODULES: qtcharts qtserialport qtremoteobjects qtwebsockets
  # rules_qt6 currently supports Bazel builds on 6.8.3; macOS qmake uses the
  # newer version that was already working before PR #16.
  QT_VERSION: '6.8.3'
  QT_QMAKE_MACOS_VERSION: '6.11.1'

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install prek
        run: pipx install prek

      - name: Run pre-commit hooks
        run: prek run --all-files

  qmake:
    name: qmake (${{ matrix.platform }})
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        platform: [windows, macos]
    runs-on: ${{ matrix.platform }}-latest
    env:
      ARTIFACT_NAME: fastecu-pr-${{ github.event.pull_request.number || github.sha }}-${{ matrix.platform }}
      PACKAGE_FILE: pr-check-${{ matrix.platform }}.zip
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: 'win64_mingw'
          modules: ${{ env.QT_MODULES }}
          tools: 'tools_mingw1310,qt.tools.win64_mingw1310'
          add-tools-to-path: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_QMAKE_MACOS_VERSION }}
          modules: ${{ env.QT_MODULES }}

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installOutput = choco install openssl -y --no-progress
          $installOutput
          $deployMatches = $installOutput | Select-String -Pattern "Deployed to '([^']+)'" | Where-Object { $_.Line -match 'openssl' }
          if ($deployMatches.Count -eq 0) {
            throw "Could not find an OpenSSL 'Deployed to' line in choco output"
          }
          if ($deployMatches.Count -gt 1) {
            throw "Found multiple OpenSSL 'Deployed to' lines in choco output, refusing to guess: $($deployMatches.Line -join ' | ')"
          }
          $opensslDir = $deployMatches[0].Matches[0].Groups[1].Value.TrimEnd('\') -replace '\\', '/'
          Write-Host "Resolved OPENSSL_ROOT=$opensslDir"
          "OPENSSL_ROOT=$opensslDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $cryptoDlls = Get-ChildItem -Path "$opensslDir/bin" -Filter 'libcrypto-*.dll' -ErrorAction SilentlyContinue
          if ($cryptoDlls.Count -eq 0) {
            throw "Could not find a libcrypto-*.dll in $opensslDir/bin"
          }
          $cryptoDll = ($cryptoDlls | Sort-Object { [int]([regex]::Match($_.Name, 'libcrypto-(\d+)-').Groups[1].Value) } -Descending | Select-Object -First 1).Name
          if ($cryptoDlls.Count -gt 1) {
            Write-Host "Multiple libcrypto-*.dll candidates found ($($cryptoDlls.Name -join ', ')), using highest SONAME: $cryptoDll"
          }
          Write-Host "Resolved OPENSSL_CRYPTO_DLL=$cryptoDll"
          "OPENSSL_CRYPTO_DLL=$cryptoDll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Build app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/pr-app | Out-Null
          Push-Location build/pr-app
          qmake CONFIG+=release CONFIG-=debug_and_release ../../FastECU.pro
          mingw32-make
          Pop-Location

      - name: Build app (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/pr-app
          cd build/pr-app
          qmake CONFIG+=release CONFIG-=debug_and_release ../../FastECU.pro
          make

      - name: Package app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/pr-static | Out-Null
          Push-Location build/pr-static
          qmake CONFIG+=release CONFIG-=debug_and_release CONFIG+=static ../../FastECU.pro
          mingw32-make
          New-Item -ItemType Directory -Force ../../dist | Out-Null
          copy FastECU.exe ../../dist\
          Pop-Location
          copy "$env:OPENSSL_ROOT/bin/$env:OPENSSL_CRYPTO_DLL" dist\
          windeployqt dist\FastECU.exe
          Compress-Archive -Path dist\* -DestinationPath $env:PACKAGE_FILE

      - name: Package app (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir dist
          cp -R build/pr-app/FastECU.app dist/
          macdeployqt dist/FastECU.app
          cd dist && zip -r "../$PACKAGE_FILE" FastECU.app

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PACKAGE_FILE }}
          retention-days: 14

      - name: Build and run mut_dma_tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/tests/mut_dma_tests | Out-Null
          Push-Location build/tests/mut_dma_tests
          qmake CONFIG+=release CONFIG-=debug_and_release ../../../tests/tests.pro
          mingw32-make
          .\mut_dma_tests.exe
          Pop-Location

      - name: Build and run mut_dma_tests (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/tests/mut_dma_tests
          cd build/tests/mut_dma_tests
          qmake CONFIG+=release CONFIG-=debug_and_release ../../../tests/tests.pro
          make
          ./mut_dma_tests

      - name: Build and run serial_crash_tests (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/tests/serial_crash_tests
          cd build/tests/serial_crash_tests
          qmake CONFIG+=release CONFIG-=debug_and_release ../../../tests/serial_crash_tests.pro
          make
          ./serial_crash_tests

      - name: Build and run mut_dma_integration_tests (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/tests/mut_dma_integration_tests
          cd build/tests/mut_dma_integration_tests
          qmake CONFIG+=release CONFIG-=debug_and_release ../../../tests/mut_dma_integration_tests.pro
          make
          ./mut_dma_integration_tests

  sonarcloud:
    name: SonarCloud
    needs: pre-commit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_QMAKE_MACOS_VERSION }}
          modules: ${{ env.QT_MODULES }}

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Install SonarCloud build wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build FastECU with build wrapper
        run: |
          mkdir -p build/sonar-app
          cd build/sonar-app
          qmake CONFIG+=release CONFIG-=debug_and_release ../../FastECU.pro
          build-wrapper-macosx-x86 --out-dir ../../bw-output make

      - name: Build and run tests with coverage
        run: |
          scripts/coverage-local.sh

      - name: Check coverage ratchet
        run: |
          scripts/check-coverage-ratchet.sh coverage/coverage-summary.txt docs/coverage-baseline.txt

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bazel:
    name: Bazel (${{ matrix.os }})
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Install Qt for host tools (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: 'win64_msvc2022_64'
          modules: ${{ env.QT_MODULES }}
          add-tools-to-path: true

      - name: Install Qt for host tools (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}

      - name: Install Qt for host tools (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}

      - name: Install Bazel prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installOutput = choco install llvm openssl -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $deployMatches = $installOutput | Select-String -Pattern "Deployed to '([^']+)'" | Where-Object { $_.Line -match 'openssl' }
          if ($deployMatches.Count -ne 1) {
            throw "Expected one OpenSSL 'Deployed to' line in choco output, found $($deployMatches.Count): $($deployMatches.Line -join ' | ')"
          }
          $opensslDir = $deployMatches[0].Matches[0].Groups[1].Value.TrimEnd('\') -replace '\\', '/'
          Write-Host "Resolved OPENSSL_ROOT=$opensslDir"
          "OPENSSL_ROOT=$opensslDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Bazel prerequisites (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm openssl@3
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Bazel prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy libssl-dev

      - name: Build Bazel targets
        run: |
          bazel build -k --config=release //:fastecu //tests/...

      - name: Build x64 pe_bitness fixture (Windows)
        if: runner.os == 'Windows'
        run: |
          bazel build -k --config=release //:pe_bitness_x64_fixture

      - name: Test Bazel targets
        run: |
          bazel test -k --config=release //tests/... //:qmake_bazel_sync //:bazel_openssl_wiring

      - name: clang-tidy report
        continue-on-error: true
        run: |
          bazel test --config=release //:clang_tidy_report --test_output=all
