name: pr

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install prek
        run: pipx install prek

      - name: Run pre-commit hooks
        run: prek run --all-files

  build:
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.8.3'
          arch: 'win64_mingw'
          modules: 'qtcharts qtserialport qtremoteobjects qtwebsockets qt5compat'
          tools: 'tools_mingw1310,qt.tools.win64_mingw1310'
          add-tools-to-path: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.11.1'
          modules: 'qtcharts qtserialport qtremoteobjects qtwebsockets qt5compat'

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installOutput = choco install openssl -y --no-progress
          $installOutput
          $deployMatches = $installOutput | Select-String -Pattern "Deployed to '([^']+)'" | Where-Object { $_.Line -match 'openssl' }
          if ($deployMatches.Count -eq 0) {
            throw "Could not find an OpenSSL 'Deployed to' line in choco output"
          }
          if ($deployMatches.Count -gt 1) {
            throw "Found multiple OpenSSL 'Deployed to' lines in choco output, refusing to guess: $($deployMatches.Line -join ' | ')"
          }
          $opensslDir = $deployMatches[0].Matches[0].Groups[1].Value.TrimEnd('\') -replace '\\', '/'
          Write-Host "Resolved OPENSSL_ROOT=$opensslDir"
          "OPENSSL_ROOT=$opensslDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $cryptoDlls = Get-ChildItem -Path "$opensslDir/bin" -Filter 'libcrypto-*.dll' -ErrorAction SilentlyContinue
          if ($cryptoDlls.Count -eq 0) {
            throw "Could not find a libcrypto-*.dll in $opensslDir/bin"
          }
          # OpenSSL installers can ship a legacy-SONAME DLL alongside the current one
          # (e.g. libcrypto-3-x64.dll next to libcrypto-4-x64.dll) for back-compat with
          # other apps. The headers under $opensslDir/include always match the newest
          # (highest SONAME) DLL, so prefer that one rather than an arbitrary match.
          $cryptoDll = ($cryptoDlls | Sort-Object { [int]([regex]::Match($_.Name, 'libcrypto-(\d+)-').Groups[1].Value) } -Descending | Select-Object -First 1).Name
          if ($cryptoDlls.Count -gt 1) {
            Write-Host "Multiple libcrypto-*.dll candidates found ($($cryptoDlls.Name -join ', ')), using highest SONAME: $cryptoDll"
          }
          Write-Host "Resolved OPENSSL_CRYPTO_DLL=$cryptoDll"
          "OPENSSL_CRYPTO_DLL=$cryptoDll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Build FastECU (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/pr-app | Out-Null
          Push-Location build/pr-app
          qmake CONFIG+=release CONFIG-=debug_and_release ../../FastECU.pro
          mingw32-make
          Pop-Location

      - name: Build FastECU (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/pr-app
          cd build/pr-app
          qmake CONFIG+=release CONFIG-=debug_and_release ../../FastECU.pro
          make

      # release.yml's static+windeployqt packaging path is release-only and was
      # never exercised by pr.yml -- that's exactly how the missing-OpenSSL-DLL
      # bug (fixed once already) got past review and only surfaced on a real
      # release. Rebuild statically here and package it the same way, so a
      # regression in that path fails a PR instead of a public release. No
      # upload -- this step exists purely to catch build/packaging failures.
      - name: Build and package Windows static (verify only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/pr-static | Out-Null
          Push-Location build/pr-static
          qmake CONFIG+=release CONFIG-=debug_and_release CONFIG+=static ../../FastECU.pro
          mingw32-make
          New-Item -ItemType Directory -Force ../../dist | Out-Null
          copy FastECU.exe ../../dist\
          Pop-Location
          copy "$env:OPENSSL_ROOT/bin/$env:OPENSSL_CRYPTO_DLL" dist\
          windeployqt dist\FastECU.exe
          Compress-Archive -Path dist\* -DestinationPath pr-check-windows.zip

      - name: Package macOS (verify only)
        if: runner.os == 'macOS'
        run: |
          mkdir dist
          cp -R build/pr-app/FastECU.app dist/
          macdeployqt dist/FastECU.app
          cd dist && zip -r ../pr-check-macos.zip FastECU.app

      - name: Build and run mut_dma_tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/tests/mut_dma_tests | Out-Null
          Push-Location build/tests/mut_dma_tests
          qmake CONFIG+=release CONFIG-=debug_and_release ../../../tests/tests.pro
          mingw32-make
          .\mut_dma_tests.exe
          Pop-Location

      - name: Build and run mut_dma_tests (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/tests/mut_dma_tests
          cd build/tests/mut_dma_tests
          qmake CONFIG+=release CONFIG-=debug_and_release ../../../tests/tests.pro
          make
          ./mut_dma_tests

      - name: Build and run serial_crash_tests (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/tests/serial_crash_tests
          cd build/tests/serial_crash_tests
          qmake CONFIG+=release CONFIG-=debug_and_release ../../../tests/serial_crash_tests.pro
          make
          ./serial_crash_tests

      - name: Build and run mut_dma_integration_tests (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/tests/mut_dma_integration_tests
          cd build/tests/mut_dma_integration_tests
          qmake CONFIG+=release CONFIG-=debug_and_release ../../../tests/mut_dma_integration_tests.pro
          make
          ./mut_dma_integration_tests

  sonarcloud:
    name: SonarCloud
    needs: pre-commit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.11.1'
          modules: 'qtcharts qtserialport qtremoteobjects qtwebsockets qt5compat'

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Install SonarCloud build wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build FastECU with build wrapper
        run: |
          mkdir -p build/sonar-app
          cd build/sonar-app
          qmake CONFIG+=release CONFIG-=debug_and_release ../../FastECU.pro
          build-wrapper-macosx-x86 --out-dir ../../bw-output make

      - name: Build and run tests with coverage
        run: |
          scripts/coverage-local.sh

      - name: Check coverage ratchet
        run: |
          scripts/check-coverage-ratchet.sh coverage/coverage-summary.txt docs/coverage-baseline.txt

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bazel:
    name: Bazel (${{ matrix.os }})
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Install Qt for host tools (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          modules: 'qtcharts qtserialport qtremoteobjects qtwebsockets qt5compat'
          add-tools-to-path: true

      - name: Install Qt for host tools (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.8.3'
          modules: 'qtcharts qtserialport qtremoteobjects qtwebsockets qt5compat'

      - name: Install Qt for host tools (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.8.3'
          modules: 'qtcharts qtserialport qtremoteobjects qtwebsockets qt5compat'

      - name: Install Bazel prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installOutput = choco install llvm openssl -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $deployMatches = $installOutput | Select-String -Pattern "Deployed to '([^']+)'" | Where-Object { $_.Line -match 'openssl' }
          if ($deployMatches.Count -ne 1) {
            throw "Expected one OpenSSL 'Deployed to' line in choco output, found $($deployMatches.Count): $($deployMatches.Line -join ' | ')"
          }
          $opensslDir = $deployMatches[0].Matches[0].Groups[1].Value.TrimEnd('\') -replace '\\', '/'
          Write-Host "Resolved OPENSSL_ROOT=$opensslDir"
          "OPENSSL_ROOT=$opensslDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Bazel prerequisites (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm openssl@3
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Bazel prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy libssl-dev

      # Temporary diagnostic tooling for the Windows QApplication-construction
      # hang under investigation (see PR #7). Installs "Debugging Tools for
      # Windows" (cdb.exe) so a later step can attach to the hung test process
      # and dump every thread's native call stack straight into the CI log.
      - name: Install debugging tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install windbg -y --no-progress
          $cdb = Get-ChildItem -Path "C:\Program Files*\Windows Kits\10\Debuggers" -Filter "cdb.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cdb) {
            throw "cdb.exe not found after installing windbg"
          }
          Write-Host "Found cdb.exe at $($cdb.FullName)"
          $cdb.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Bazel targets
        run: |
          bazel build -k --config=release //:fastecu //tests/...

      - name: Dump Linker Parameters
        if: failure()
        run: |
          cat bazel-out/x64_windows-opt/bin/fastecu.exe-0.params
        shell: bash

      - name: Test Bazel targets
        run: |
          bazel test -k --config=release //tests/... //:qmake_bazel_sync //:bazel_openssl_wiring

      # Temporary diagnostic (see PR #7): re-run one of the known-hanging
      # suites in the background, wait until it's confirmed stuck, then
      # attach cdb non-invasively and print every thread's call stack. This
      # runs regardless of the previous step's outcome (it's expected to fail).
      - name: Capture hang stack trace (diagnostic, Windows)
        if: ${{ !cancelled() && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock {
            Set-Location $using:PWD
            bazel test --test_timeout=120 --nocache_test_results //tests:test_romraider_conversion 2>&1
          }
          Start-Sleep -Seconds 45
          $proc = Get-Process -Name "test_romraider_conversion" -ErrorAction SilentlyContinue
          if ($proc) {
            Write-Host "=== [hang-diag] found pid $($proc.Id); capturing stack trace ==="
            cdb -p $proc.Id -c "~*kb; qd" 2>&1
          } else {
            Write-Host "=== [hang-diag] test_romraider_conversion.exe process not found after 45s ==="
          }
          Wait-Job $job -Timeout 150 | Out-Null
          Receive-Job $job
          Remove-Job $job -Force -ErrorAction SilentlyContinue

      - name: clang-tidy report
        continue-on-error: true
        run: |
          bazel test //:clang_tidy_report --test_output=all
