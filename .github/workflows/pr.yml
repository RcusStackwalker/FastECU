name: pr

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  QT_MODULES: qtcharts qtserialport qtremoteobjects qtwebsockets
  # rules_qt supports Bazel builds on Qt 6.8.3.
  QT_VERSION: '6.8.3'

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install prek
        run: pipx install prek

      - name: Run pre-commit hooks
        run: prek run --all-files

  sonarcloud:
    name: SonarCloud
    needs: pre-commit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}

      - name: Install OpenSSL
        run: brew install openssl@3

      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-sonar

      - name: Install LLVM (macOS)
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Generate compile_commands.json
        run: bazel run //bazel/compile_commands:refresh_sonar

      - name: Build and run tests with coverage
        run: |
          scripts/coverage-local.sh

      - name: SonarCloud scan
        id: sonarcloud
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  bazel:
    name: Bazel (${{ matrix.os }})
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Install Qt for host tools (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: 'win64_msvc2022_64'
          modules: ${{ env.QT_MODULES }}
          add-tools-to-path: true

      - name: Install Qt for host tools (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}

      - name: Install Qt for host tools (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}

      - name: Install Bazel prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installOutput = choco install llvm openssl -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $deployMatches = $installOutput | Select-String -Pattern "Deployed to '([^']+)'" | Where-Object { $_.Line -match 'openssl' }
          if ($deployMatches.Count -ne 1) {
            throw "Expected one OpenSSL 'Deployed to' line in choco output, found $($deployMatches.Count): $($deployMatches.Line -join ' | ')"
          }
          $opensslDir = $deployMatches[0].Matches[0].Groups[1].Value.TrimEnd('\') -replace '\\', '/'
          Write-Host "Resolved OPENSSL_ROOT=$opensslDir"
          "OPENSSL_ROOT=$opensslDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $cryptoDlls = Get-ChildItem -Path "$opensslDir/bin" -Filter 'libcrypto-*.dll' -ErrorAction SilentlyContinue
          if ($cryptoDlls.Count -eq 0) { throw "No libcrypto-*.dll in $opensslDir/bin" }
          $cryptoDll = ($cryptoDlls | Sort-Object { [int]([regex]::Match($_.Name, 'libcrypto-(\d+)-').Groups[1].Value) } -Descending | Select-Object -First 1).Name
          "OPENSSL_CRYPTO_DLL=$cryptoDll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Bazel prerequisites (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm openssl@3
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Bazel prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy libssl-dev

      - name: Build Bazel targets
        run: |
          bazel build -k --config=release //:fastecu //tests/...

      - name: Build x64 pe_bitness fixture (Windows)
        if: runner.os == 'Windows'
        run: |
          bazel build -k --config=release //src/platform/desktop/windows/j2534:pe_bitness_x64_fixture

      - name: Test Bazel targets
        run: |
          bazel test -k --config=release //tests/... //:bazel_openssl_wiring //:serial_compat_allowlist //:portable_closure

      - name: Package macOS from Bazel (verify only)
        if: runner.os == 'macOS'
        run: scripts/package-macos.sh bazel-pkg-macos.zip ${{ github.sha }}

      - name: Upload macOS Bazel package (verify only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fastecu-bazelpkg-${{ github.event.pull_request.number || github.sha }}-macos
          path: bazel-pkg-macos.zip
          retention-days: 14

      - name: Package Windows from Bazel (verify only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/package-windows.ps1 -OutZip bazel-pkg-windows.zip -Version ${{ github.sha }}

      - name: Upload Windows Bazel package (verify only)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fastecu-bazelpkg-${{ github.event.pull_request.number || github.sha }}-windows
          path: bazel-pkg-windows.zip
          retention-days: 14

      - name: clang-tidy report
        continue-on-error: true
        run: |
          bazel run --config=release //:clang_tidy_report
